name: DAST Scan (OWASP ZAP)

on:
  workflow_run:
    workflows: ["CD Deploy to Staging"]
    types: [completed]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for DAST scan'
        required: true
        default: 'http://localhost:5000'

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  # ============================================================
  # STAGE 20: DAST Scan
  # ============================================================
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine target URL
        id: target
        run: |
          if [ -n "${{ inputs.target_url }}" ]; then
            echo "url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ vars.STAGING_URL || 'http://localhost:5000' }}" >> $GITHUB_OUTPUT
          fi

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: security/zap/zap-baseline.conf
          cmd_options: '-a -j'
          allow_issue_writing: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json

      - name: ZAP Summary
        if: always()
        run: |
          echo "## DAST Scan Results (OWASP ZAP)" >> $GITHUB_STEP_SUMMARY
          if [ -f report_json.json ]; then
            ALERTS=$(jq '[.site[].alerts[]] | length' report_json.json 2>/dev/null || echo "N/A")
            HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' report_json.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' report_json.json 2>/dev/null || echo "0")
            LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' report_json.json 2>/dev/null || echo "0")
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $ALERTS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No ZAP report generated" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Scheduled weekly security scan
  # ============================================================
  scheduled-scan:
    name: Scheduled Security Scan
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scheduled scans
        run: echo "Scheduled scan placeholder — triggers same pipeline"
