sonar.projectKey=anlehtouf_pfe-securetrack-devsecops
sonar.organization=anlehtouf
sonar.projectName=SecureTrack DevSecOps

# Sources and tests — both backend and frontend
sonar.sources=app/backend/src,app/frontend/src
sonar.tests=app/backend/tests,app/frontend/tests
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/reports/**,**/*.min.js,**/vendor/**

# Coverage report — backend Jest (lcov)
sonar.javascript.lcov.reportPaths=app/backend/coverage/lcov.info

# Language
sonar.language=js

# Wait for quality gate result in the CI step
sonar.qualitygate.wait=true
